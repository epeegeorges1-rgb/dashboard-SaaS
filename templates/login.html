<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Dashboard Projets</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Poppins', sans-serif; background:linear-gradient(135deg,#f0f4f8,#d9e4ec); display:flex; justify-content:center; align-items:center; height:100vh; animation:fadeIn 1s ease;}
.container {background:white; padding:40px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:350px; animation:slideUp 0.7s ease;}
h2 {text-align:center; margin-bottom:25px; color:#1e293b;}
input {width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; font-size:1em; transition:0.3s;}
input:focus {border-color:#4CAF50; box-shadow:0 0 5px rgba(76,175,80,0.5);}
button {width:100%; padding:12px; border:none; border-radius:8px; background:linear-gradient(135deg,#4CAF50,#2ecc71); color:white; font-size:1em; cursor:pointer; transition:0.3s;}
button:hover {transform:scale(1.05);}
p {text-align:center; margin-top:15px; font-size:0.9em;}
a {color:#2e86de; text-decoration:none; transition:0.3s;}
a:hover {text-decoration:underline;}
@keyframes fadeIn {0%{opacity:0;}100%{opacity:1;}}
@keyframes slideUp {0%{transform:translateY(30px); opacity:0;}100%{transform:translateY(0); opacity:1;}}
</style>
</head>
<body>
<div class="container"><!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>🔐 Connexion</header>
<div class="container">
  <div class="card">
    <form method="post">
      <input name="username" placeholder="Nom d'utilisateur" required>
      <input name="password" type="password" placeholder="Mot de passe" required>
      <button>Se connecter</button>
    </form>
    <p>Pas encore de compte ? <a href="{{ url_for('register') }}">S'inscrire</a></p>
  </div>
</div>
</body>
</html>

</html>
